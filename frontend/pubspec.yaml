name: mca_placement_app
description: MCA Placement Management System for student and SPC workflows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  file_picker: ^10.3.2
  firebase_core: ^4.1.0
  firebase_messaging: ^16.0.1
  flutter_riverpod: ^2.6.1
  google_sign_in: ^6.2.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/rvce-logo.png
