name: Ephemeral Runner Demo

# The 'workflow_dispatch' is what creates the "Run workflow" button in the UI!
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      simulate_attack:
        description: 'Simulate Crypto-Miner (Delays runner by 3 minutes)'
        required: true
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Start Ephemeral Job
        run: echo "Starting CI/CD Runner Pod..."
      
      - name: Normal CI/CD Work
        run: sleep 10 # Normal short-lived pod behavior
        
      - name: Malicious Hijacking Simulation
        if: ${{ inputs.simulate_attack == true }}
        run: |
          echo "WARNING: Unauthorized binary execution detected..."
          sleep 180 # Forces a long TTL anomaly for your ML to catch!
          
      - name: Clean up
        run: echo "Destroying runner."
